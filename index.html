<title>潮汕钓红点｜模式选择</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",Arial,sans-serif;background:linear-gradient(#053d27,#0b6b42);color:#2b2520;display:flex;align-items:center;justify-content:center;padding:18px}
.panel{width:min(760px,94vw);background:#fff8e8;border-radius:24px;padding:28px;box-shadow:0 14px 36px rgba(0,0,0,.22)}
h1{margin:0 0 8px;text-align:center;font-size:34px}
.sub{text-align:center;color:#6f6252;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mode{background:#fff;border:2px solid #eadfca;border-radius:20px;padding:22px;text-align:left;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.10)}
.mode:hover{border-color:#ffc85a;transform:translateY(-2px)}
.mode h2{margin:0 0 10px;font-size:24px}
.mode p{line-height:1.6;color:#66584a}
button{border:0;border-radius:14px;padding:13px 18px;font-weight:900;font-size:17px;background:#ffc85a;cursor:pointer}
.note{margin-top:18px;color:#7a6b5c;font-size:14px;line-height:1.6}
@media(max-width:640px){.grid{grid-template-columns:1fr}h1{font-size:28px}.panel{padding:20px}}
</style>
</head>
<body>
<div class="panel">
  <h1>潮汕钓红点</h1>
  <div class="sub">当前版本：combined11｜一个入口，两个模式</div>
  <div class="grid">
    <div class="mode" onclick="loadMode('online')">
      <h2>👥 联机真人版</h2>

      <button>进入联机版</button>
    </div>
    <div class="mode" onclick="loadMode('single')">
      <h2>🤖 单机 AI 版</h2>
      <p>不需要房间号。自己选择 1–3 个 AI，对战练习规则。</p>
      <button>进入单机版</button>
    </div>
  </div>
  <div class="note">
    建议：发给朋友玩时，用“联机真人版”；自己测试时，用“单机 AI 版”。<br>
    如果朋友链接带 room 房间号，会自动进入联机版。
  </div>
</div>

function decodeHtml(b64){
  return new TextDecoder("utf-8").decode(Uint8Array.from(atob(b64), c => c.charCodeAt(0)));
}
function loadMode(mode){
  const url = new URL(location.href);
  url.searchParams.set("mode", mode);
  if(mode === "online") url.searchParams.set("v", "combined11-online");
  if(mode === "single") url.searchParams.set("v", "combined11-single");
  history.replaceState(null, "", url.toString());

  const html = mode === "single" ? decodeHtml(SINGLE_HTML_B64) : decodeHtml(ONLINE_HTML_B64);
  document.open();
  document.write(html);
  document.close();
}

const params = new URLSearchParams(location.search);
if(params.get("room")){
  loadMode("online");
}else if(params.get("mode")==="online" || params.get("mode")==="single"){
  loadMode(params.get("mode"));
}
</script>
